<mat-toolbar color="primary">
  <span class="title-center">DEPARTMAN</span>
</mat-toolbar>

<div class="top-actions">

  <button mat-raised-button color="primary" (click)="openAddDialog()">
    <mat-icon>add</mat-icon>
    Add
  </button>

</div>

<div class="container mat-elevation-z8">

  <!-- Filter -->
  <!-- <mat-form-field>
    <input matInput (keyup)="applyFilter($any($event.target).value)" placeholder="Filter">
  </mat-form-field> -->
  <div class="search-row">
    <mat-form-field>
      <mat-label>Fakultet</mat-label>
      
      <mat-select [(ngModel)]="selectedFakultetId">
          <mat-option *ngFor="let fakultet of fakulteti" [value]="fakultet.id">
              {{ fakultet.naziv }}
          </mat-option>
      </mat-select>
    </mat-form-field>
    <button mat-raised-button color="primary"
            (click)="filterBySelector()">
      <mat-icon>search</mat-icon>
      Search
    </button>

    <button mat-raised-button color="warn"
          (click)="clearFilter()">
      <mat-icon>clear</mat-icon>
      Clear
    </button>
  </div>


  <!-- Table -->
  <mat-table [dataSource]="dataSource" matSort>

    <!-- ID -->
    <ng-container matColumnDef="id">
      <mat-header-cell *matHeaderCellDef mat-sort-header>ID</mat-header-cell>
      <mat-cell *matCellDef="let row">{{row.id}}</mat-cell>
    </ng-container>

    <!-- Naziv -->
    <ng-container matColumnDef="naziv">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Naziv</mat-header-cell>
      <mat-cell *matCellDef="let row">{{row.naziv}}</mat-cell>
    </ng-container>

    <!-- Sedište -->
    <ng-container matColumnDef="oznaka">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Oznaka</mat-header-cell>
      <mat-cell *matCellDef="let row">{{row.oznaka}}</mat-cell>
    </ng-container>

    <!-- Fakultet -->
    <ng-container matColumnDef="fakultet">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Fakultet</mat-header-cell>
      <mat-cell *matCellDef="let row">{{row.fakultet.naziv}}</mat-cell>
    </ng-container>

    <!-- Actions -->
    <ng-container matColumnDef="actions">
      <mat-header-cell *matHeaderCellDef>Actions</mat-header-cell>
      <mat-cell *matCellDef="let row" class="actions-cell">
        <button
          mat-raised-button
          color="primary"
          aria-label="Update"
          (click)="openUpdateDialog(row); $event.stopPropagation()">
          <mat-icon>update</mat-icon>
          Update
        </button>

        <button
          mat-raised-button
          color="warn"
          aria-label="Delete"
          (click)="confirmDelete(row); $event.stopPropagation()">
          <mat-icon>delete</mat-icon>
          Delete
        </button>
      </mat-cell>
    </ng-container>


    <!-- Table Header + Rows -->
    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>

  </mat-table>

  <!-- Pagination -->
  <mat-paginator
    [pageSize]="10"
    [pageSizeOptions]="[5,10,20]"
    [showFirstLastButtons]="true">
  </mat-paginator>

</div>
