<div class="container">
  <h3 mat-dialog-title *ngIf="data.mode === 'add'">Adding new student</h3>
  <h3 mat-dialog-title *ngIf="data.mode === 'update'">Edit student</h3>
  <form class="mat-dialog-content" #formControl="ngForm">
    <div *ngIf="data.mode === 'update'">
        <mat-form-field>
            <mat-label>ID</mat-label>
            <input matInput [(ngModel)]="student.id" [readonly]= "true", name='id'>
        </mat-form-field>
    </div>
    <div>
        <mat-form-field>
            <mat-label>Ime</mat-label>
            <input matInput [(ngModel)]="student.ime" name='ime'>
        </mat-form-field>
    </div>
    <div>
        <mat-form-field>
            <mat-label>Prezime</mat-label>
            <input matInput [(ngModel)]="student.prezime" name='prezime'>
        </mat-form-field>
    </div>
    <div>
        <mat-form-field>
            <mat-label>Broj Indeksa</mat-label>
            <input matInput [(ngModel)]="student.brojIndeksa" name='brojIndeksa'>
        </mat-form-field>
    </div>
    <div>
        <mat-form-field>
            <mat-label>Departman</mat-label>
            <mat-select [(ngModel)]="student.departman" name="departman" [compareWith]="compareTo">
                <mat-option *ngFor="let departman of departmani" [value]="departman">
                    {{ departman.naziv }}
                </mat-option>
            </mat-select>
        </mat-form-field>
    </div>
    <div>
        <mat-form-field>
            <mat-label>Status</mat-label>
            <mat-select [(ngModel)]="student.status" name="status" [compareWith]="compareTo">
                <mat-option *ngFor="let status of statusi" [value]="status">
                    {{ status.naziv }}
                </mat-option>
            </mat-select>
        </mat-form-field>
    </div>
    <div mat-dialog-actions>

        <button mat-button (click)="cancel()">Cancel</button>

        <!-- ADD -->
        <button *ngIf="data.mode === 'add'"
                mat-raised-button
                color="primary"
                (click)="create()">
            Add
        </button>

        <!-- UPDATE -->
        <button *ngIf="data.mode === 'update'"
                mat-raised-button
                color="accent"
                (click)="update()">
            Update
        </button>


    </div>
  </form>
</div>
