<mat-toolbar color="primary">
  <span class="title-center">STUDENT</span>
</mat-toolbar>

<div class="top-actions">

  <button mat-raised-button color="primary" (click)="openAddDialog()">
    <mat-icon>add</mat-icon>
    Add
  </button>

</div>

<div class="container mat-elevation-z8">

  <!-- Filter -->
  <!-- <mat-form-field>
    <input matInput (keyup)="applyFilter($any($event.target).value)" placeholder="Filter">
  </mat-form-field> -->

  <div class="search-row">
    <mat-form-field>
      <mat-label>Departman</mat-label>
      
      <mat-select [(ngModel)]="selectedDepartmanId">
          <mat-option *ngFor="let departman of depertmani" [value]="departman.id">
              {{ departman.naziv }}
          </mat-option>
      </mat-select>
    </mat-form-field>
    <button mat-raised-button color="primary"
            (click)="filterBySelector()">
      <mat-icon>search</mat-icon>
      Search
    </button>

    <button mat-raised-button color="warn"
          (click)="clearFilter()">
      <mat-icon>clear</mat-icon>
      Clear
    </button>
  </div>


  <!-- Table -->
  <mat-table [dataSource]="dataSource" matSort>

    <!-- ID -->
    <ng-container matColumnDef="id">
      <mat-header-cell *matHeaderCellDef mat-sort-header>ID</mat-header-cell>
      <mat-cell *matCellDef="let row">{{row.id}}</mat-cell>
    </ng-container>

    <!-- Ime -->
    <ng-container matColumnDef="ime">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Ime</mat-header-cell>
      <mat-cell *matCellDef="let row">{{row.ime}}</mat-cell>
    </ng-container>

    <!-- Prezime -->
    <ng-container matColumnDef="prezime">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Prezime</mat-header-cell>
      <mat-cell *matCellDef="let row">{{row.prezime}}</mat-cell>
    </ng-container>

    <!-- Broj Indeksa -->
    <ng-container matColumnDef="brojIndeksa">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Broj Indeksa</mat-header-cell>
      <mat-cell *matCellDef="let row">{{row.brojIndeksa}}</mat-cell>
    </ng-container>

    <!-- Status -->
    <ng-container matColumnDef="status">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Status</mat-header-cell>
      <mat-cell *matCellDef="let row">{{row.status?.naziv}}</mat-cell>
    </ng-container>

    <!-- Departman -->
    <ng-container matColumnDef="departman">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Departman</mat-header-cell>
      <mat-cell *matCellDef="let row">{{row.departman?.naziv}}</mat-cell>
    </ng-container>

    <!-- Actions -->
    <ng-container matColumnDef="actions">
      <mat-header-cell *matHeaderCellDef>Actions</mat-header-cell>
      <mat-cell *matCellDef="let row" class="actions-cell">
        <button
          mat-raised-button
          color="primary"
          aria-label="Update"
          (click)="openUpdateDialog(row); $event.stopPropagation()">
          <mat-icon>update</mat-icon>
          Update
        </button>

        <button
          mat-raised-button
          color="warn"
          aria-label="Delete"
          (click)="confirmDelete(row); $event.stopPropagation()">
          <mat-icon>delete</mat-icon>
          Delete
        </button>
      </mat-cell>
    </ng-container>


    <!-- Table Header + Rows -->
    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>

  </mat-table>

  <!-- Pagination -->
  <mat-paginator
    [pageSize]="10"
    [pageSizeOptions]="[5,10,20]"
    [showFirstLastButtons]="true">
  </mat-paginator>

</div>
