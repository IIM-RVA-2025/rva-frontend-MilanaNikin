<mat-toolbar color="primary">
  <span class="title-center">FAKULTET</span>
</mat-toolbar>

<div class="top-actions">

  <button mat-raised-button color="primary" (click)="openAddDialog()">
    <mat-icon>add</mat-icon>
    Add
  </button>

</div>

<div class="container mat-elevation-z8">

  <!-- Filter
  <mat-form-field>
    <input matInput (keyup)="applyFilter($any($event.target).value)" placeholder="Filter">
  </mat-form-field> -->

  <div class="search-row">

    <mat-form-field>
      <mat-label>Search by Naziv</mat-label>
      <input matInput #nazivInput>
    </mat-form-field>

    <button mat-raised-button color="primary"
            (click)="searchByNaziv(nazivInput.value)">
      <mat-icon>search</mat-icon>
      Search
    </button>

    <mat-form-field>
      <mat-label>Search by Sedište</mat-label>
      <input matInput #sedisteInput>
    </mat-form-field>

    <button mat-raised-button color="primary"
            (click)="searchBySediste(sedisteInput.value)">
      <mat-icon>search</mat-icon>
      Search
    </button>

    <button mat-raised-button color="warn"
          (click)="clearFilter(nazivInput, sedisteInput)">
      <mat-icon>clear</mat-icon>
      Clear
    </button>

  </div>

  <!-- Table -->
  <mat-table [dataSource]="dataSource" matSort>

    <!-- ID -->
    <ng-container matColumnDef="id">
      <mat-header-cell *matHeaderCellDef mat-sort-header>ID</mat-header-cell>
      <mat-cell *matCellDef="let row">{{row.id}}</mat-cell>
    </ng-container>

    <!-- Naziv -->
    <ng-container matColumnDef="naziv">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Naziv</mat-header-cell>
      <mat-cell *matCellDef="let row">{{row.naziv}}</mat-cell>
    </ng-container>

    <!-- Sedište -->
    <ng-container matColumnDef="sediste">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Sedište</mat-header-cell>
      <mat-cell *matCellDef="let row">{{row.sediste}}</mat-cell>
    </ng-container>

    <!-- Actions -->
    <ng-container matColumnDef="actions">
      <mat-header-cell *matHeaderCellDef>Actions</mat-header-cell>
      <mat-cell *matCellDef="let row" class="actions-cell">
        <button
          mat-raised-button
          color="primary"
          aria-label="Update"
          (click)="openUpdateDialog(row); $event.stopPropagation()">
          <mat-icon>update</mat-icon>
          Update
        </button>

        <button
          mat-raised-button
          color="warn"
          aria-label="Delete"
          (click)="confirmDelete(row); $event.stopPropagation()">
          <mat-icon>delete</mat-icon>
          Delete
        </button>
      </mat-cell>
    </ng-container>


    <!-- Table Header + Rows -->
    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>

  </mat-table>

  <!-- Pagination -->
  <mat-paginator
    [pageSize]="10"
    [pageSizeOptions]="[5,10,20]"
    [showFirstLastButtons]="true">
  </mat-paginator>

</div>
